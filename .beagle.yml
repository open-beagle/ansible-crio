kind: pipeline
name: docker

trigger:
  branch:
    - main

clone:
  disable: true

steps:
  - name: fetch
    image: registry.cn-qingdao.aliyuncs.com/wod/devops-git:1.0
    settings:
      proxy:
        from_secret: SOCKS5_PROXY

  - name: crun-amd64
    image: registry.cn-qingdao.aliyuncs.com/wod/crun:v1.15-amd64
    environment:
      TARGET_ARCH: amd64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH
      - cp /bin/crun dist/linux-$TARGET_ARCH/crun

  - name: crio-amd64
    image: registry.cn-qingdao.aliyuncs.com/wod/cri-o:v1.30.1-amd64
    environment:
      TARGET_ARCH: amd64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH/crio
      - cp -r /deb/* dist/linux-$TARGET_ARCH/crio

  - name: cri-tools-amd64
    image: registry.cn-qingdao.aliyuncs.com/wod/cri-tools:v1.30.0-amd64
    environment:
      TARGET_ARCH: amd64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH
      - cp /bin/crictl dist/linux-$TARGET_ARCH/crictl

  - name: cni-amd64
    image: registry.cn-qingdao.aliyuncs.com/wod/kube-cni-plugins:v1.3.0-amd64
    environment:
      TARGET_ARCH: amd64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH/cni-plugins
      - cp /opt/cni/bin/* dist/linux-$TARGET_ARCH/cni-plugins/

  - name: iptables-amd64
    image: registry.cn-qingdao.aliyuncs.com/wod/iptables:v1.8.0-amd64
    environment:
      TARGET_ARCH: amd64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH
      - cp -r /iptables dist/linux-$TARGET_ARCH

  - name: tgz-amd64
    image: registry.cn-qingdao.aliyuncs.com/wod/alpine:3
    environment:
      TARGET_ARCH: amd64
    commands:
      - mkdir -p .tmp/$TARGET_ARCH
      - tar zcvf .tmp/$TARGET_ARCH/crio-v1.30.1.tgz crio -C dist/linux-$TARGET_ARCH/ .
    depends_on:
      - crun-amd64
      - crio-amd64
      - cri-tools-amd64
      - cni-amd64
      - iptables-amd64

  - name: crun-arm64
    image: registry.cn-qingdao.aliyuncs.com/wod/crun:v1.15-arm64
    environment:
      TARGET_ARCH: arm64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH
      - cp /bin/crun dist/linux-$TARGET_ARCH/crun

  - name: crio-arm64
    image: registry.cn-qingdao.aliyuncs.com/wod/cri-o:v1.30.1-arm64
    environment:
      TARGET_ARCH: arm64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH/crio
      - cp -r /deb/* dist/linux-$TARGET_ARCH/crio

  - name: cri-tools-arm64
    image: registry.cn-qingdao.aliyuncs.com/wod/cri-tools:v1.30.0-arm64
    environment:
      TARGET_ARCH: arm64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH
      - cp /bin/crictl dist/linux-$TARGET_ARCH/crictl

  - name: cni-arm64
    image: registry.cn-qingdao.aliyuncs.com/wod/kube-cni-plugins:v1.3.0-arm64
    environment:
      TARGET_ARCH: arm64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH/cni-plugins
      - cp /opt/cni/bin/* dist/linux-$TARGET_ARCH/cni-plugins/

  - name: iptables-arm64
    image: registry.cn-qingdao.aliyuncs.com/wod/iptables:v1.8.0-arm64
    environment:
      TARGET_ARCH: arm64
    commands:
      - mkdir -p dist/linux-$TARGET_ARCH
      - cp -r /iptables dist/linux-$TARGET_ARCH

  - name: tgz-arm64
    image: registry.cn-qingdao.aliyuncs.com/wod/alpine:3
    environment:
      TARGET_ARCH: arm64
    commands:
      - mkdir -p .tmp/$TARGET_ARCH
      - tar zcvf .tmp/$TARGET_ARCH/crio-v1.30.1.tgz crio -C dist/linux-$TARGET_ARCH/ .
    depends_on:
      - crun-arm64
      - crio-arm64
      - cri-tools-arm64
      - cni-arm64
      - iptables-arm64

  - name: minio
    image: registry.cn-qingdao.aliyuncs.com/wod/devops-minio:1.0
    environment:
      S3_ACCESS_KEY:
        from_secret: ACCESS_KEY_MINIO
      S3_SECRET_KEY:
        from_secret: SECRET_KEY_MINIO
    commands:
      - mkdir -p .tmp
      - cp -r ./scripts/*.sh .tmp
      - mc alias set cache --api=S3v4 https://cache.wodcloud.com $S3_ACCESS_KEY $S3_SECRET_KEY
      - mc cp --recursive .tmp/ cache/kubernetes/k8s/crio/
    depends_on:
      - fetch
      - tgz-amd64
      - tgz-arm64

---
kind: secret
name: SOCKS5_PROXY
get:
  name: SOCKS5_PROXY
  path: devops-secrets

---
kind: secret
name: ACCESS_KEY_MINIO
get:
  name: ACCESS_KEY_MINIO
  path: devops-secrets

---
kind: secret
name: SECRET_KEY_MINIO
get:
  name: SECRET_KEY_MINIO
  path: devops-secrets
